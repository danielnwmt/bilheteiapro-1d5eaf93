# ============================================================
# BilheteIA PRO — instalação 1 CLIQUE com banco LOCAL.
# Imagem tudo-em-um: Postgres + Auth + API + app num único
# container, na mesma porta. Basta "subir" no painel da Localweb.
# ============================================================

services:
  app:
    build:
      context: .
      args:
        # A URL da API precisa ser gravada no frontend no build.
        # Depois do SSL, o watcher troca SUPABASE_PUBLIC_URL para https://dominio
        # e o deploy reconstrói com essa URL, evitando "Failed to fetch".
        VITE_SUPABASE_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
        SUPABASE_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
    container_name: bia-app
    restart: always
    environment:
      # Deixe vazio para detectar o IP público automaticamente.
      # Em domínio/HTTPS, defina ex.: https://seu-dominio.com.br
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-contato@protenexus.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin.1234}
      JWT_SECRET: ${JWT_SECRET:-bilheteia-localweb-default-jwt-secret-change-me-2026}
      PORT: ${APP_PORT:-3000}
      # Arquivo-gatilho do botão "Atualizar sistema" (compartilhado com o host).
      DEPLOY_TRIGGER_FILE: /opt/app/deploy-trigger/request
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - bia-db-data:/var/lib/postgresql/data
      # Pasta compartilhada com o host: o app grava o gatilho aqui e o
      # watcher (update-watcher.sh) no host roda o deploy.sh.
      - ./deploy-trigger:/opt/app/deploy-trigger

volumes:
  bia-db-data:
