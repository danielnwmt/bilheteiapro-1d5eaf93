_format_version: "2.1"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Authorization
        - Content-Type
        - X-Client-Info
        - apikey
        - Prefer
        - Range
      exposed_headers:
        - Content-Range
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
